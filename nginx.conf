worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    upstream app {
        server app:3000;
    }

    upstream bot {
        server bot:8001;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ActivityPub / WebFinger → Botkit
        location /.well-known/webfinger {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /.well-known/nodeinfo {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bot actor — redirect browsers to about page, proxy AP clients to Botkit
        location /ap/ {
            if ($http_accept ~* "text/html" ) {
                set $maybe_redirect "html";
            }
            if ($http_accept !~* "application/activity\+json|application/ld\+json") {
                set $maybe_redirect "${maybe_redirect}_noap";
            }
            if ($maybe_redirect = "html_noap") {
                return 302 $scheme://$host/about;
            }

            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /users/ {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /nodeinfo/ {
            proxy_pass http://bot;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → SvelteKit
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
